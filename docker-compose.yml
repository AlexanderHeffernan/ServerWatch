services:
  serverwatch:
    build: .
    container_name: serverwatch-website
    restart: unless-stopped
    ports:
      - "3001:80"
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
